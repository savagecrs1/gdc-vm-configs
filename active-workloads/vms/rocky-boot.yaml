apiVersion: v1
kind: ConfigMap
metadata:
  name: rocky-virtspec
  namespace: vms
data:
  virtSpec: |
    template:
      spec:
        domain:
          devices:
            disks:
            - disk:
                bus: virtio
              name: cloudinitdisk
        volumes:
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |-
              #cloud-config
              user: rocky
              password: password123
              chpasswd: { expire: False }
              ssh_pwauth: True
---
apiVersion: vm.cluster.gke.io/v1
kind: VirtualMachine
metadata:
  name: rocky
  namespace: vms
  annotations:
    vm.cluster.gke.io/virt-spec-configmap: rocky-virtspec
spec:
  autoRestartOnConfigurationChange: true
  osType: Linux
  compute:
    cpu:
      vcpus: 2
    memory:
      capacity: 8Gi
  disks:
  - boot: true
    driver: virtio
    virtualMachineDiskName: rocky-boot
    autoDelete: false
  interfaces:
  - default: true
    name: eth0
    ports:
    - name: ssh
      port: 22
    - name: http
      port: 80
    networkName: pod-network
---
apiVersion: v1
kind: Service
metadata:
  name: rocky-nodeport
  namespace: vms
spec:
  type: NodePort
  selector:
    kubevirt.io/domain: rocky
  ports:
  - name: ssh
    port: 22
    targetPort: 22
  - name: http
    port: 80
    targetPort: 80


