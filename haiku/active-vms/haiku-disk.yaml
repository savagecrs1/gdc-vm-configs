apiVersion: vm.cluster.gke.io/v1
kind: VirtualMachineDisk
metadata:
  name: haiku-boot
  namespace: vms
spec:
  size: 10Gi
  storageClassName: local-shared
  source:
    gcs:
      # Use your coworker's bucket URL here
      url: gs://living-on-the-edge-vm-disk-images/haiku.raw
      # This tells it to use the KSA we are about to create
      serviceAccount: gem-vm-puller 
